<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/x-icon" href="icons/smash-logo.ico">
    <meta name="theme-color" content="#3b82f6">
    <title>SMASH RSVP - Responses</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f6f7fb; color: #1f2937; min-height: 100vh;
        }

        .topbar {
            position: sticky; top: 0; z-index: 5;
            display: grid; grid-template-columns: auto 1fr auto;
            align-items: center; padding: 10px 14px;
            background: #fff; border-bottom: 1px solid #e5e7eb; gap: 12px;
        }
        .brand { display: flex; align-items: center; gap: 8px; }
        .title-icon { width: 48px; height: 48px; border-radius: 12px; object-fit: cover; box-shadow: 0 6px 12px rgba(0,0,0,.15); }
        .title-bar {
            text-align: center; margin: 0; font-size: clamp(1.2rem,4vw,1.8rem);
            letter-spacing: .08em; text-transform: uppercase;
            background: linear-gradient(120deg,#ff8a00,#ff3d7f,#7b2ff7);
            -webkit-background-clip: text; color: transparent;
        }
        .nav-links { display: flex; align-items: center; gap: 10px; }
        .nav-btn {
            padding: 8px 14px; border-radius: 8px; border: 1px solid #e5e7eb;
            background: #fff; font-weight: 600; font-size: 14px; color: #1f2937;
            text-decoration: none; cursor: pointer; transition: all 0.2s;
        }
        .nav-btn:hover { background: #f9fafb; border-color: #3b82f6; }

        .container { max-width: 1100px; margin: 0 auto; padding: 20px 12px; }

        /* Auth gate */
        .auth-gate { text-align: center; padding: 60px 20px; }
        .auth-gate h2 { margin-bottom: 16px; }
        .auth-gate p { color: #6b7280; margin-bottom: 24px; }
        .sign-in-btn {
            padding: 12px 28px; border-radius: 10px; border: none;
            background: #3b82f6; color: #fff; font-weight: 600; font-size: 1rem;
            cursor: pointer; transition: background 0.2s;
        }
        .sign-in-btn:hover { background: #2563eb; }
        .access-denied { color: #ef4444; font-weight: 600; margin-top: 16px; }

        /* Event header */
        .event-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 16px; padding: 24px; color: #fff; margin-bottom: 24px;
        }
        .event-header h2 { font-size: 1.5rem; margin-bottom: 6px; }
        .event-header .event-time { opacity: 0.9; font-size: 0.95rem; }

        /* Summary */
        .summary-bar {
            display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap;
        }
        .summary-item {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff; padding: 14px 24px; border-radius: 12px; text-align: center;
            min-width: 110px; flex: 1;
        }
        .summary-item .label { font-size: 0.75rem; text-transform: uppercase; opacity: 0.9; margin-bottom: 4px; }
        .summary-item .value { font-size: 1.6rem; font-weight: 700; }

        /* Actions bar */
        .actions-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
        }
        .actions-bar h3 { font-size: 1.1rem; color: #1e293b; }
        .btn {
            padding: 10px 20px; border-radius: 8px; border: 1px solid #e5e7eb;
            background: #fff; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: all 0.2s;
        }
        .btn:hover { background: #f9fafb; }
        .btn.success { background: #10b981; color: #fff; border-color: #10b981; }
        .btn.success:hover { background: #059669; }

        /* Table */
        .table-wrapper {
            overflow-x: auto; border-radius: 12px; border: 1px solid #e5e7eb;
            background: #fff;
        }
        table { width: 100%; border-collapse: collapse; }
        thead { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
        th {
            padding: 14px 16px; text-align: left; font-weight: 600; font-size: 0.82rem;
            text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap;
        }
        td { padding: 12px 16px; border-bottom: 1px solid #f3f4f6; font-size: 0.9rem; }
        tbody tr:hover { background: #f9fafb; }
        tbody tr:last-child td { border-bottom: none; }

        .empty-state { text-align: center; padding: 40px; color: #6b7280; font-style: italic; }
        .error-state { text-align: center; padding: 40px; color: #ef4444; font-weight: 600; }

        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            padding: 12px 24px; border-radius: 10px; color: #fff; font-weight: 600;
            z-index: 100; opacity: 0; transition: opacity 0.3s;
        }
        .toast.show { opacity: 1; }
        .toast.success { background: #10b981; }
        .toast.error { background: #ef4444; }

        @media (max-width: 640px) {
            .summary-item { min-width: 80px; padding: 10px 14px; }
            .summary-item .value { font-size: 1.3rem; }
        }
    </style>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <!-- SheetJS for Excel export -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
</head>
<body>
<header class="topbar">
    <div class="brand">
        <img src="icons/smash-logo.png" alt="SMASH Logo" class="title-icon" />
    </div>
    <h1 class="title-bar">RSVP Responses</h1>
    <div class="nav-links">
        <a href="rsvp-admin.html" class="nav-btn">RSVP Admin</a>
    </div>
</header>

<!-- Auth Gate -->
<div id="authGate" class="auth-gate">
    <h2>Admin Access Required</h2>
    <p>Sign in with your Google account to view responses.</p>
    <button class="sign-in-btn" onclick="signIn()">Sign in with Google</button>
    <p id="accessDenied" class="access-denied" style="display:none;">Access denied. Only admins can view responses.</p>
</div>

<!-- Main Content -->
<main id="mainContent" class="container" style="display:none;">
    <div class="event-header" id="eventHeader">
        <h2>Loading event...</h2>
    </div>

    <div class="summary-bar" id="summaryBar"></div>

    <div class="actions-bar">
        <h3 id="responseCount">Responses</h3>
        <button class="btn success" onclick="exportToExcel()">&#128196; Export to Excel</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Family ID</th>
                    <th>Adults</th>
                    <th>Kids</th>
                    <th>Submitted</th>
                </tr>
            </thead>
            <tbody id="responsesBody">
                <tr><td colspan="7" class="empty-state">Loading responses...</td></tr>
            </tbody>
        </table>
    </div>
</main>

<div id="toast" class="toast"></div>

<script src="firebase-config.js?v=6"></script>
<script>
const ADMIN_EMAILS = [
    "jue.george@gmail.com",
    "binoybt@gmail.com",
    "geojins@gmail.com",
    "b.ajaymathews@gmail.com"
];

const params = new URLSearchParams(window.location.search);
const eventId = params.get('id');
let currentResponses = [];
let eventName = '';

function showToast(message, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = `toast ${type} show`;
    setTimeout(() => toast.classList.remove('show'), 3000);
}

function escapeHtml(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

function formatDateTime(dateStr, timeStr) {
    const d = new Date(dateStr + 'T' + timeStr);
    return d.toLocaleDateString('en-US', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
        hour: 'numeric', minute: '2-digit'
    });
}

function formatTimestamp(ts) {
    if (!ts) return '—';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric',
        hour: 'numeric', minute: '2-digit'
    });
}

// Auth
function signIn() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).catch(err => {
        console.error('Sign-in error:', err);
        showToast('Sign-in failed.', 'error');
    });
}

auth.onAuthStateChanged(user => {
    const gate = document.getElementById('authGate');
    const content = document.getElementById('mainContent');
    const denied = document.getElementById('accessDenied');

    if (user && ADMIN_EMAILS.includes(user.email)) {
        gate.style.display = 'none';
        content.style.display = '';
        loadData();
    } else if (user) {
        denied.style.display = '';
    } else {
        gate.style.display = '';
        content.style.display = 'none';
        denied.style.display = 'none';
    }
});

async function loadData() {
    if (!eventId) {
        document.getElementById('eventHeader').innerHTML = '<h2 style="color:#ef4444;">No event ID provided</h2>';
        return;
    }

    // Load event details
    try {
        const eventDoc = await db.collection('rsvpEvents').doc(eventId).get();
        if (!eventDoc.exists) {
            document.getElementById('eventHeader').innerHTML = '<h2 style="color:#ef4444;">Event not found</h2>';
            return;
        }
        const e = eventDoc.data();
        eventName = e.name;
        document.title = 'Responses — ' + eventName;
        document.getElementById('eventHeader').innerHTML = `
            <h2>${escapeHtml(e.name)}</h2>
            <div class="event-time">&#128197; ${formatDateTime(e.eventDate, e.eventTimeStr)}</div>
        `;
    } catch (err) {
        console.error('Error loading event:', err);
        document.getElementById('eventHeader').innerHTML = '<h2 style="color:#ef4444;">Error loading event</h2>';
        return;
    }

    // Load responses
    try {
        const snapshot = await db.collection('rsvpResponses').where('eventId', '==', eventId).get();
        currentResponses = [];
        snapshot.forEach(doc => currentResponses.push({ id: doc.id, ...doc.data() }));
        currentResponses.sort((a, b) => {
            const ta = a.submittedAt ? (a.submittedAt.toDate ? a.submittedAt.toDate() : new Date(a.submittedAt)) : new Date(0);
            const tb = b.submittedAt ? (b.submittedAt.toDate ? b.submittedAt.toDate() : new Date(b.submittedAt)) : new Date(0);
            return tb - ta;
        });
        renderResponses();
    } catch (err) {
        console.error('Error loading responses:', err);
        document.getElementById('responsesBody').innerHTML =
            '<tr><td colspan="7" class="error-state">Error loading responses: ' + escapeHtml(err.message) + '</td></tr>';
    }
}

function renderResponses() {
    const tbody = document.getElementById('responsesBody');
    const summary = document.getElementById('summaryBar');
    const countEl = document.getElementById('responseCount');

    if (currentResponses.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No responses yet.</td></tr>';
        summary.innerHTML = '';
        countEl.textContent = 'No responses';
        return;
    }

    let totalAdults = 0, totalKids = 0;
    currentResponses.forEach(r => {
        totalAdults += r.adults || 0;
        totalKids += r.kids || 0;
    });

    countEl.textContent = currentResponses.length + ' Response' + (currentResponses.length !== 1 ? 's' : '');

    summary.innerHTML = `
        <div class="summary-item"><div class="label">Responses</div><div class="value">${currentResponses.length}</div></div>
        <div class="summary-item"><div class="label">Total Adults</div><div class="value">${totalAdults}</div></div>
        <div class="summary-item"><div class="label">Total Kids</div><div class="value">${totalKids}</div></div>
        <div class="summary-item"><div class="label">Total People</div><div class="value">${totalAdults + totalKids}</div></div>
    `;

    tbody.innerHTML = currentResponses.map((r, i) => `
        <tr>
            <td>${i + 1}</td>
            <td>${escapeHtml(r.firstName)}</td>
            <td>${escapeHtml(r.lastName)}</td>
            <td>${escapeHtml(r.familyId) || '—'}</td>
            <td>${r.adults}</td>
            <td>${r.kids}</td>
            <td>${formatTimestamp(r.submittedAt)}</td>
        </tr>
    `).join('');
}

function exportToExcel() {
    if (currentResponses.length === 0) return showToast('No responses to export.', 'error');

    const rows = currentResponses.map((r, i) => ({
        '#': i + 1,
        'First Name': r.firstName,
        'Last Name': r.lastName,
        'Family ID': r.familyId || '',
        'Adults': r.adults,
        'Kids': r.kids,
        'Submitted': formatTimestamp(r.submittedAt)
    }));

    let totalAdults = 0, totalKids = 0;
    currentResponses.forEach(r => { totalAdults += r.adults || 0; totalKids += r.kids || 0; });
    rows.push({
        '#': '',
        'First Name': '',
        'Last Name': 'TOTAL',
        'Family ID': '',
        'Adults': totalAdults,
        'Kids': totalKids,
        'Submitted': ''
    });

    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Responses');

    const colWidths = Object.keys(rows[0]).map(key => ({
        wch: Math.max(key.length, ...rows.map(r => String(r[key] || '').length)) + 2
    }));
    ws['!cols'] = colWidths;

    const filename = (eventName || 'rsvp').replace(/[^a-zA-Z0-9]/g, '_') + '_responses.xlsx';
    XLSX.writeFile(wb, filename);
    showToast('Excel exported!');
}
</script>
</body>
</html>
