<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/x-icon" href="icons/smash-logo.ico">
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="SMASH">
    <link rel="apple-touch-icon" href="icons/smash-logo.png">
    <title>SMASH Events</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Outfit:wght@400;500;600;700&display=swap">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', system-ui, -apple-system, sans-serif;
            background: #f1f5f9;
            color: #0f172a;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .topbar {
            position: sticky; top: 0; z-index: 100;
            display: grid; grid-template-columns: auto 1fr auto;
            align-items: center; padding: 10px 18px;
            background: #0f172a;
            border-bottom: 1px solid rgba(255,255,255,.07);
            gap: 14px;
            box-shadow: 0 2px 20px rgba(0,0,0,.3);
        }
        .brand { display: flex; align-items: center; gap: 10px; }
        .title-icon {
            width: 44px; height: 44px; border-radius: 12px; object-fit: cover;
            box-shadow: 0 4px 12px rgba(0,0,0,.35), 0 0 0 1.5px rgba(255,255,255,.12);
        }
        .title-bar {
            text-align: center; margin: 0;
            font-family: 'Barlow Condensed', system-ui, sans-serif;
            font-size: clamp(1.4rem,4vw,2rem);
            font-weight: 800; letter-spacing: .12em; text-transform: uppercase;
            background: linear-gradient(120deg, #fbbf24, #f87171, #a78bfa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .nav-links { display: flex; align-items: center; gap: 10px; }
        .nav-btn {
            padding: 7px 14px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,.15);
            background: rgba(255,255,255,.08);
            font-weight: 600; font-size: 13px; color: #e2e8f0;
            text-decoration: none; cursor: pointer; transition: all 0.2s;
            font-family: inherit;
        }
        .nav-btn:hover { background: rgba(255,255,255,.15); border-color: rgba(255,255,255,.3); }
        .nav-btn.admin { background: #3b82f6; color: #fff; border-color: #3b82f6; }
        .nav-btn.admin:hover { background: #2563eb; }

        .container { max-width: 1100px; margin: 0 auto; padding: 20px 14px; }

        .page-header { text-align: center; margin-bottom: 28px; }
        .page-header h2 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.8rem; font-weight: 700; letter-spacing: .06em;
            color: #0f172a; margin-bottom: 6px;
        }
        .page-header p { color: #64748b; font-size: 0.95rem; }

        .no-events { text-align: center; padding: 40px; color: #64748b; font-style: italic; }

        /* Table */
        .events-table-wrapper {
            overflow-x: auto; border-radius: 16px;
            border: 1px solid #e2e8f0; background: #fff;
            box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 2px 8px rgba(0,0,0,.04);
        }
        table { width: 100%; border-collapse: collapse; }
        thead { background: #0f172a; color: #fff; }
        th {
            padding: 14px 16px; text-align: left; font-weight: 700;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.08em;
            white-space: nowrap;
        }
        td { padding: 13px 16px; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; vertical-align: top; }
        tbody tr { transition: background .15s; }
        tbody tr:hover { background: #f8fafc; }
        tbody tr:last-child td { border-bottom: none; }

        .event-name { font-weight: 700; color: #0f172a; }
        .event-date { white-space: nowrap; font-weight: 600; color: #7c3aed; }
        .event-desc { color: #475569; max-width: 280px; }
        .event-venue { color: #0369a1; font-weight: 500; }
        .event-contact { white-space: nowrap; }
        .reg-link {
            display: inline-block; padding: 5px 14px; border-radius: 999px;
            background: #10b981; color: #fff; text-decoration: none;
            font-size: 0.82rem; font-weight: 700; transition: all 0.2s;
            box-shadow: 0 2px 6px rgba(16,185,129,.3);
        }
        .reg-link:hover { background: #059669; transform: translateY(-1px); }

        .badge-upcoming {
            display: inline-block; padding: 2px 9px; border-radius: 999px;
            background: #dbeafe; color: #1d4ed8; font-size: 0.72rem; font-weight: 700; margin-left: 6px;
        }
        .badge-today { background: #dcfce7; color: #166534; }
        .badge-past { background: #f1f5f9; color: #94a3b8; }

        .footer { text-align: center; margin-top: 48px; padding: 20px; }
        .back-btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 11px 26px;
            background: #0f172a;
            color: white; text-decoration: none; border-radius: 10px;
            font-weight: 600; transition: all 0.25s ease;
            box-shadow: 0 4px 14px rgba(15,23,42,.25);
            font-family: inherit;
        }
        .back-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(15,23,42,.35); }

        /* Mobile cards */
        .events-cards { display: none; }
        .event-card {
            background: #fff; border: 1px solid #e2e8f0; border-radius: 16px;
            padding: 16px; margin-bottom: 12px;
            box-shadow: 0 1px 3px rgba(0,0,0,.06);
            transition: box-shadow .2s;
        }
        .event-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.08); }
        .event-card .card-title { font-weight: 700; font-size: 1rem; color: #0f172a; margin-bottom: 10px; }
        .event-card .card-row { display: flex; gap: 8px; margin-bottom: 6px; font-size: 0.88rem; }
        .event-card .card-label { font-weight: 700; color: #64748b; min-width: 90px; font-size: .78rem; text-transform: uppercase; letter-spacing: .04em; }
        .event-card .card-value { color: #0f172a; }

        @media (max-width: 768px) {
            .events-table-wrapper { display: none; }
            .events-cards { display: block; }
        }
    </style>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body>
<header class="topbar">
    <div class="brand">
        <img src="icons/smash-logo.png" alt="SMASH Logo" class="title-icon" />
    </div>
    <h1 class="title-bar">SMASH Events</h1>
    <div class="nav-links">
        <a href="index.html" class="nav-btn">Schedule</a>
        <a href="wishlist.html" class="nav-btn">Wishlist</a>
        <a href="rsvp-admin.html" class="nav-btn admin" id="rsvpAdminLink" style="display:none;">RSVP</a>
        <a href="events-admin.html" class="nav-btn admin" id="adminLink" style="display:none;">Admin</a>
        <a href="wishlist-admin.html" class="nav-btn admin" id="wishlistAdminLink" style="display:none;">Wishlist Admin</a>
    </div>
</header>

<main class="container">
    <div class="page-header">
        <h2>Upcoming Events</h2>
        <p>Stay informed about SMASH community events and activities</p>
    </div>

    <!-- Desktop Table -->
    <div class="events-table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Event</th>
                    <th>Date</th>
                    <th>Description</th>
                    <th>Venue</th>
                    <th>Contact</th>
                    <th>Registration</th>
                </tr>
            </thead>
            <tbody id="eventsTableBody">
                <tr><td colspan="6" class="no-events">Loading events...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Mobile Cards -->
    <div class="events-cards" id="eventsCards">
        <p class="no-events">Loading events...</p>
    </div>

    <div class="footer">
        <a href="index.html" class="back-btn">&larr; Back to Schedule</a>
    </div>
</main>

<script src="firebase-config.js?v=6"></script>
<script>
const ADMIN_EMAILS = [
    "jue.george@gmail.com",
    "binoybt@gmail.com",
    "geojins@gmail.com"
];

// Show admin link for admins
auth.onAuthStateChanged(user => {
    if (user && ADMIN_EMAILS.includes(user.email)) {
        document.getElementById('adminLink').style.display = '';
        document.getElementById('rsvpAdminLink').style.display = '';
        document.getElementById('wishlistAdminLink').style.display = '';
    }
});

function formatDate(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
}

function getDateBadge(dateStr, endDateStr) {
    const today = new Date();
    today.setHours(0,0,0,0);
    const startDate = new Date(dateStr + 'T00:00:00');
    startDate.setHours(0,0,0,0);
    const endDate = endDateStr ? new Date(endDateStr + 'T00:00:00') : startDate;
    endDate.setHours(0,0,0,0);
    if (today > endDate) return '<span class="badge-upcoming badge-past">Past</span>';
    if (today >= startDate && today <= endDate) return '<span class="badge-upcoming badge-today">Ongoing</span>';
    return '<span class="badge-upcoming">Upcoming</span>';
}

function formatDateRange(dateStr, endDateStr) {
    const start = formatDate(dateStr);
    if (!endDateStr) return start;
    return start + ' — ' + formatDate(endDateStr);
}

function escapeHtml(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

function formatContact(contact, phone) {
    if (!contact && !phone) return '';
    let html = contact ? escapeHtml(contact) : '';
    if (phone) {
        if (html) html += '<br>';
        html += '<a href="tel:' + escapeHtml(phone) + '" style="color:#3b82f6;text-decoration:none;">' + escapeHtml(phone) + '</a>';
    }
    return html;
}

function renderEvents(events) {
    const tbody = document.getElementById('eventsTableBody');
    const cards = document.getElementById('eventsCards');

    if (events.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="no-events">No events scheduled at this time.</td></tr>';
        cards.innerHTML = '<p class="no-events">No events scheduled at this time.</p>';
        return;
    }

    // Table rows
    tbody.innerHTML = events.map(e => `
        <tr>
            <td class="event-name">${escapeHtml(e.name)}</td>
            <td class="event-date">${formatDateRange(e.date, e.endDate)} ${getDateBadge(e.date, e.endDate)}</td>
            <td class="event-desc">${escapeHtml(e.description)}</td>
            <td class="event-venue">${escapeHtml(e.venue)}</td>
            <td class="event-contact">${formatContact(e.contact, e.phone)}</td>
            <td>${e.registration ? `<a href="${escapeHtml(e.registration)}" target="_blank" class="reg-link">Register</a>` : '<span style="color:#9ca3af">—</span>'}</td>
        </tr>
    `).join('');

    // Mobile cards
    cards.innerHTML = events.map(e => `
        <div class="event-card">
            <div class="card-title">${escapeHtml(e.name)} ${getDateBadge(e.date, e.endDate)}</div>
            <div class="card-row"><span class="card-label">Date</span><span class="card-value" style="color:#7c3aed;font-weight:500">${formatDateRange(e.date, e.endDate)}</span></div>
            <div class="card-row"><span class="card-label">Description</span><span class="card-value">${escapeHtml(e.description)}</span></div>
            <div class="card-row"><span class="card-label">Venue</span><span class="card-value" style="color:#0369a1">${escapeHtml(e.venue)}</span></div>
            <div class="card-row"><span class="card-label">Contact</span><span class="card-value">${formatContact(e.contact, e.phone)}</span></div>
            <div class="card-row"><span class="card-label">Registration</span><span class="card-value">${e.registration ? `<a href="${escapeHtml(e.registration)}" target="_blank" class="reg-link">Register</a>` : '<span style="color:#9ca3af">—</span>'}</span></div>
        </div>
    `).join('');
}

// Load events from Firestore, ordered by date
db.collection('events').orderBy('date', 'asc').onSnapshot(snapshot => {
    const events = [];
    snapshot.forEach(doc => {
        events.push({ id: doc.id, ...doc.data() });
    });
    renderEvents(events);
}, err => {
    console.error('Error loading events:', err);
    document.getElementById('eventsTableBody').innerHTML =
        '<tr><td colspan="6" class="no-events">Error loading events. Please refresh.</td></tr>';
});
</script>
</body>
</html>
